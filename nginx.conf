daemon off;

events
{
	worker_connections 1024;
}

rtmp
{
	
	server
	{
		listen 1935;

		chunk_size 4000;

		application stream
		{
			live on;
			hls on;
			hls_type live;
			hls_fragment_naming timestamp;
			hls_fragment 3s;
			hls_playlist_length 30s;
			hls_path /opt/data/hls;
			hls_nested on;

			hls_variant _source BANDWIDTH=1650000,RESOLUTION=640x480;
		}
	}
}

http
{

	map $http_origin $cors_origin {
        default "";
        "https://foxkids.club" "https://foxkids.club";
        "https://foxkids-online.ru" "https://foxkids-online.ru";
        "http://foxkids.club" "http://foxkids.club";
        "http://foxkids-online.ru" "http://foxkids-online.ru";
		"https://stream.foxkids.club" "https://stream.foxkids.club";
		"http://stream.foxkids.club" "http://stream.foxkids.club";
		
    }
	
	root /www/static;
	sendfile off;
	tcp_nopush on;
	include /etc/nginx/mime.types;
	access_log /dev/stdout;
	error_log  /dev/stdout;

	server
	{
		listen 443 ssl default;
		ssl_certificate /etc/nginx/ssl/foxkids.online.crt;
		ssl_certificate_key /etc/nginx/ssl/foxkids.online.key;
		ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
		ssl_prefer_server_ciphers on;

		location /hls
		{
			types
			{
				application/vnd.apple.mpegurl m3u8;
				video/mp2t ts;
			}
			root /opt/data;
			add_header Cache-Control no-cache;
			add_header Access-Control-Allow-Origin $cors_origin always;
			valid_referers blocked server_names foxkids.club *.foxkids.club foxkids-online.ru *.foxkids-online.ru foxkids.online *.foxkids.online;
			if ($invalid_referer) {
				return 403;
			}
		}

		location /
		{
			proxy_pass http://backend:8000;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "Upgrade";
			proxy_set_header Host $host;
		}
	}

	server
	{
		listen 80;

		location /
		{
			proxy_pass http://backend:8000;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection "Upgrade";
			proxy_set_header Host $host;
		}
		
		location /hls
		{
			types
			{
				application/vnd.apple.mpegurl m3u8;
				video/mp2t ts;
			}
			root /opt/data;
			add_header Cache-Control no-cache;
			add_header Access-Control-Allow-Origin $cors_origin always;
			valid_referers blocked server_names foxkids.club *.foxkids.club foxkids-online.ru *.foxkids-online.ru;
			if ($invalid_referer) {
				return 403;
			}
		}

	}
}
